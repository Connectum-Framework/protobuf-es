syntax = "proto3";
package bench.v1;

// Simplified subset of the OTLP metrics export request. Intentionally shaped
// after opentelemetry.proto.collector.metrics.v1.ExportMetricsServiceRequest
// to be representative of a real batched metric export call without pulling
// in the full dependency graph. Shares AnyValue / KeyValue / Resource /
// InstrumentationScope with nested.proto by re-declaring them locally — buf
// keeps each .proto self-contained here (the per-file `bench.v1` scope is
// preserved but message names are prefixed with `Metric` to avoid a
// collision with nested.proto when compiled together).

message MetricAnyValue {
  oneof value {
    string string_value = 1;
    bool bool_value = 2;
    int64 int_value = 3;
    double double_value = 4;
    bytes bytes_value = 7;
  }
}

message MetricKeyValue {
  string key = 1;
  MetricAnyValue value = 2;
}

message MetricInstrumentationScope {
  string name = 1;
  string version = 2;
  repeated MetricKeyValue attributes = 3;
}

message MetricResource {
  repeated MetricKeyValue attributes = 1;
}

// NumberDataPoint is the leaf type shared by Gauge and Sum. Matches the
// OTLP shape with a scalar oneof (`as_double` / `as_int`).
message NumberDataPoint {
  repeated MetricKeyValue attributes = 7;
  fixed64 start_time_unix_nano = 2;
  fixed64 time_unix_nano = 3;
  oneof value {
    double as_double = 4;
    int64 as_int = 6;
  }
}

// HistogramDataPoint mirrors the shape used by Prometheus-style histograms
// exported via OTLP — explicit bucket bounds + per-bucket counts.
message HistogramDataPoint {
  repeated MetricKeyValue attributes = 9;
  fixed64 start_time_unix_nano = 2;
  fixed64 time_unix_nano = 3;
  uint64 count = 4;
  double sum = 5;
  repeated uint64 bucket_counts = 6;
  repeated double explicit_bounds = 7;
  double min = 11;
  double max = 12;
}

message Gauge {
  repeated NumberDataPoint data_points = 1;
}

message Sum {
  repeated NumberDataPoint data_points = 1;
  int32 aggregation_temporality = 2;
  bool is_monotonic = 3;
}

message Histogram {
  repeated HistogramDataPoint data_points = 1;
  int32 aggregation_temporality = 2;
}

message Metric {
  string name = 1;
  string description = 2;
  string unit = 3;
  oneof data {
    Gauge gauge = 5;
    Sum sum = 7;
    Histogram histogram = 9;
  }
}

message ScopeMetrics {
  MetricInstrumentationScope scope = 1;
  repeated Metric metrics = 2;
}

message ResourceMetrics {
  MetricResource resource = 1;
  repeated ScopeMetrics scope_metrics = 2;
}

message ExportMetricsRequest {
  repeated ResourceMetrics resource_metrics = 1;
}
