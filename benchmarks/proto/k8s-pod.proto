syntax = "proto3";
package bench.v1;

// Subset of the Kubernetes core/v1 Pod object. Field numbers are NOT the
// upstream JSON-generated numbers (the canonical k8s API serializes as
// JSON, not protobuf); this is a plausible protobuf-shaped representation
// used to exercise map-heavy configuration payloads with the same shape
// kube-apiserver/kubelet would traffic over gRPC-equivalent channels.
//
// Why this shape matters for the benchmark: k8s payloads are map-dominant
// (labels, annotations, limits, requests), carry multiple small nested
// messages (containers, ports, env), and are a common integration target
// for protobuf-based RPC inside clusters.

message K8sObjectMeta {
  string name = 1;
  string namespace = 2;
  string uid = 5;
  string resource_version = 6;
  int64 generation = 17;
  map<string, string> labels = 11;
  map<string, string> annotations = 12;
  fixed64 creation_timestamp_unix_nano = 8;
}

message K8sEnvVar {
  string name = 1;
  string value = 2;
}

message K8sPort {
  string name = 1;
  int32 container_port = 3;
  string protocol = 4;
}

message K8sResourceRequirements {
  map<string, string> limits = 1;
  map<string, string> requests = 2;
}

message K8sContainer {
  string name = 1;
  string image = 2;
  repeated string command = 3;
  repeated string args = 4;
  repeated K8sEnvVar env = 7;
  repeated K8sPort ports = 6;
  K8sResourceRequirements resources = 8;
  string image_pull_policy = 14;
}

message K8sPodSpec {
  repeated K8sContainer containers = 2;
  string restart_policy = 3;
  string node_name = 10;
  string service_account_name = 9;
  int64 termination_grace_period_seconds = 4;
}

message K8sContainerStatus {
  string name = 1;
  bool ready = 4;
  int32 restart_count = 5;
  string image = 6;
  string image_id = 7;
  string container_id = 8;
  bool started = 10;
}

message K8sPodStatus {
  string phase = 1;
  string pod_ip = 6;
  string host_ip = 5;
  fixed64 start_time_unix_nano = 7;
  repeated K8sContainerStatus container_statuses = 8;
}

message K8sPod {
  K8sObjectMeta metadata = 1;
  K8sPodSpec spec = 2;
  K8sPodStatus status = 3;
}

// Convenience list wrapper — exercises the repeated-of-complex-message
// path at the outer level. Matches how a PodList would be serialized.
message K8sPodList {
  repeated K8sPod items = 2;
}
