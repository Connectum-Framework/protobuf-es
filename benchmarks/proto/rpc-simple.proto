syntax = "proto3";
package bench.v1;

// RpcRequest/RpcResponse is the most common RPC envelope shape seen in
// production — a handful of routing fields + string-keyed headers + an
// opaque payload carried as bytes. This fixture measures the baseline
// per-call overhead: no deep nesting, a small map, a moderate-size
// bytes blob. The ratio of this vs. the OTLP workload tells us how much
// of the slowdown comes from per-message fixed costs vs. per-field walk.

message RpcRequest {
  string service = 1;
  string method = 2;
  map<string, string> headers = 3;
  bytes payload = 4;
  fixed64 request_id = 5;
  int64 deadline_ms = 6;
}

message RpcResponse {
  fixed64 request_id = 1;
  int32 status_code = 2;
  map<string, string> headers = 3;
  bytes payload = 4;
  string error_message = 5;
}
